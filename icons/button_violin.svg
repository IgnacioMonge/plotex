<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="16" height="16" version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <g>
    <!-- Axes -->
    <path style="fill:none;stroke:#000000;stroke-width:1;stroke-linecap:butt"
       d="M 1,0.5 V 15 H 15.5" />
    <!-- Left violin body (symmetric, organic shape) -->
    <path style="fill:#d4e4ff;fill-opacity:0.85;stroke:#6a5acd;stroke-width:0.6"
       d="M 5.5,1.5 C 5.2,3 3.8,4.5 3.5,6.5 3.3,8.2 3.8,10 4.5,11.5 5,12.5 5.5,13.5 5.5,13.5 5.5,13.5 6,12.5 6.5,11.5 7.2,10 7.7,8.2 7.5,6.5 7.2,4.5 5.8,3 5.5,1.5 Z" />
    <!-- Left whisker -->
    <line x1="5.5" y1="2.5" x2="5.5" y2="12.5"
       style="stroke:#6a5acd;stroke-width:0.4" />
    <!-- Left IQR box -->
    <rect x="4.6" y="5.5" width="1.8" height="3.5" rx="0.3"
       style="fill:#ffffff;fill-opacity:0.9;stroke:#6a5acd;stroke-width:0.5" />
    <!-- Left median dot -->
    <circle cx="5.5" cy="7" r="0.7"
       style="fill:#6a5acd;stroke:none" />
    <!-- Right violin body (different shape = different distribution) -->
    <path style="fill:#d4e4ff;fill-opacity:0.85;stroke:#6a5acd;stroke-width:0.6"
       d="M 12,2.5 C 11.5,4 10.2,5.5 10,7 9.8,8.5 10.5,10.5 11,11.5 11.5,12.5 12,13 12,13 12,13 12.5,12.5 13,11.5 13.5,10.5 14.2,8.5 14,7 13.8,5.5 12.5,4 12,2.5 Z" />
    <!-- Right whisker -->
    <line x1="12" y1="3.5" x2="12" y2="12"
       style="stroke:#6a5acd;stroke-width:0.4" />
    <!-- Right IQR box -->
    <rect x="11.1" y="6" width="1.8" height="3.5" rx="0.3"
       style="fill:#ffffff;fill-opacity:0.9;stroke:#6a5acd;stroke-width:0.5" />
    <!-- Right median dot -->
    <circle cx="12" cy="8" r="0.7"
       style="fill:#6a5acd;stroke:none" />
  </g>
</svg>
